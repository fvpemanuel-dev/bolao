<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão da Elna</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#005f1f,#000,#003f8a);
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:1100px;
    margin:auto;
}

.topo{
    text-align:center;
    color:white;
}

.topo h1{
    font-size:70px;
    color:#ffd400;
    text-shadow:3px 3px 10px #000;
}

.partida{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
    margin:20px 0;
}

.time{
    text-align:center;
    color:white;
}

.bandeira{
    font-size:90px;
}

.time h2{
    margin-top:10px;
    font-size:35px;
}

.x{
    font-size:80px;
    color:white;
    font-weight:bold;
}

.info{
    background:white;
    padding:20px;
    border-radius:15px;
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:15px;
}

.info div{
    display:flex;
    flex-direction:column;
}

.info label{
    margin-bottom:5px;
    font-weight:bold;
}

.info input{
    padding:12px;
}

.formulario{
    background:white;
    margin-top:20px;
    padding:20px;
    border-radius:15px;
}

.formulario h2{
    margin-bottom:15px;
}

.formulario input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
}

.placar{
    display:flex;
    align-items:center;
    gap:10px;
}

.placar input{
    width:100px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#009933;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.resumo{
    display:flex;
    gap:20px;
    margin-top:20px;
}

.card{
    flex:1;
    background:white;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

.card h3{
    color:#006400;
}

.card span{
    display:block;
    margin-top:10px;
    font-size:30px;
    font-weight:bold;
}

table{
    width:100%;
    background:white;
    margin-top:20px;
    border-collapse:collapse;
    border-radius:15px;
    overflow:hidden;
}

th{
    background:#003f8a;
    color:white;
}

th,td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

.regra{
    background:#006400;
    color:white;
    margin-top:20px;
    padding:20px;
    border-radius:15px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

@media(max-width:768px){

.info{
    grid-template-columns:1fr;
}

.resumo{
    flex-direction:column;
}

.topo h1{
    font-size:45px;
}

.bandeira{
    font-size:60px;
}

}

</style>
</head>
<body>

<div class="container">

<div class="topo">

<h1>BOLÃO DA ELNA</h1>

<div class="partida">

<div class="time">
<div class="bandeira">🇧🇷</div>
<h2>BRASIL</h2>
</div>

<div class="x">X</div>

<div class="time">
<div class="bandeira">🏴</div>
<h2>ESCÓCIA</h2>
</div>

</div>

</div>

<div class="info">

<div>
<label>Data da Partida</label>
<input type="date">
</div>

<div>
<label>Horário</label>
<input type="time">
</div>

<div>
<label>Valor da Aposta</label>
<input value="R$ 10,00" readonly>
</div>

</div>

<div class="formulario">

<h2>Registrar Participante</h2>

<input id="nome" placeholder="Nome do participante">

<div class="placar">
<input id="golsBrasil" type="number" placeholder="Brasil">
<span>X</span>
<input id="golsEscocia" type="number" placeholder="Escócia">
</div>

<br>

<button onclick="adicionarParticipante()">
Salvar Palpite
</button>

</div>

<div class="resumo">

<div class="card">
<h3>Total Arrecadado</h3>
<span id="total">R$ 0,00</span>
</div>

<div class="card">
<h3>Prêmio (75%)</h3>
<span id="premio">R$ 0,00</span>
</div>

</div>

<table>

<thead>
<tr>
<th>#</th>
<th>Nome</th>
<th>Palpite</th>
<th>Valor</th>
</tr>
</thead>

<tbody id="tabelaParticipantes"></tbody>

</table>

<div class="regra">
🏆 QUEM ACERTAR O PLACAR EXATO LEVA 75% DO VALOR ARRECADADO!
</div>

</div>
<!-- Biblioteca do Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// URL DO PROJETO (SEM /rest/v1/)
const supabaseUrl =
'https://xyvevejnonuxzowxjkzt.supabase.co';

// CHAVE PUBLICÁVEL
const supabaseKey =
'sb_publishable_XKA2Otqh5RhZfbCQaDDu5A_0wavRkmT';

// Cria conexão
const supabase = window.supabase.createClient(
    supabaseUrl,
    supabaseKey
);


// SALVAR PARTICIPANTE
async function adicionarParticipante(){

    const nome =
    document.getElementById('nome').value.trim();

    const golsBrasil =
    document.getElementById('golsBrasil').value;

    const golsEscocia =
    document.getElementById('golsEscocia').value;

    if(nome === ''){
        alert('Informe o nome');
        return;
    }

    if(golsBrasil === '' || golsEscocia === ''){
        alert('Informe o placar completo');
        return;
    }

    const { error } = await supabase
    .from('participantes')
    .insert([
        {
            nome: nome,
            gols_brasil: Number(golsBrasil),
            gols_escocia: Number(golsEscocia)
        }
    ]);

    if(error){
        console.error(error);
        alert(error.message);
        return;
    }

    alert('Palpite registrado com sucesso!');

    document.getElementById('nome').value = '';
    document.getElementById('golsBrasil').value = '';
    document.getElementById('golsEscocia').value = '';

    carregarParticipantes();
}



// CARREGAR PARTICIPANTES
async function carregarParticipantes(){

    const { data, error } = await supabase
    .from('participantes')
    .select('*')
    .order('id', { ascending: true });

    if(error){
        console.error(error);
        return;
    }

    const tabela =
    document.getElementById('tabelaParticipantes');

    tabela.innerHTML = '';

    data.forEach((item, index) => {

        tabela.innerHTML += `
            <tr>
                <td>${index + 1}</td>
                <td>${item.nome}</td>
                <td>
                    Brasil ${item.gols_brasil}
                    x
                    ${item.gols_escocia} Escócia
                </td>
                <td>R$ 10,00</td>
            </tr>
        `;
    });

    const total = data.length * 10;
    const premio = total * 0.75;

    document.getElementById('total')
    .innerText = `R$ ${total.toFixed(2)}`;

    document.getElementById('premio')
    .innerText = `R$ ${premio.toFixed(2)}`;
}



// ATUALIZA AUTOMATICAMENTE
supabase
.channel('participantes')
.on(
    'postgres_changes',
    {
        event: '*',
        schema: 'public',
        table: 'participantes'
    },
    () => {
        carregarParticipantes();
    }
)
.subscribe();


// CARREGA AO ABRIR A PÁGINA
carregarParticipantes();

</script>

</body>
</html>
</body>
</html>
